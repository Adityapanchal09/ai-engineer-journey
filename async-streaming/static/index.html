<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chat — Day 23</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 16px 24px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      font-size: 18px;
      font-weight: 600;
      color: #a78bfa;
    }

    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 15px;
      white-space: pre-wrap;
    }

    .user {
      background: #4c1d95;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }

    .assistant {
      background: #1e1e1e;
      color: #e0e0e0;
      align-self: flex-start;
      border-bottom-left-radius: 2px;
      border: 1px solid #2a2a2a;
    }

    .assistant.streaming::after {
      content: '▋';
      animation: blink 0.7s infinite;
      color: #a78bfa;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    #input-area {
      display: flex;
      gap: 10px;
      padding: 16px 24px;
      background: #1a1a1a;
      border-top: 1px solid #2a2a2a;
    }

    #user-input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #111;
      color: #e0e0e0;
      font-size: 15px;
      outline: none;
      resize: none;
    }

    #user-input:focus {
      border-color: #a78bfa;
    }

    #send-btn {
      padding: 12px 24px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #send-btn:hover { background: #6d28d9; }
    #send-btn:disabled { background: #3b3b3b; cursor: not-allowed; }
  </style>
</head>
<body>

  <header>⚡ AI Chat — FastAPI Streaming (Day 23)</header>

  <div id="chat-box"></div>

  <div id="input-area">
    <textarea
      id="user-input"
      rows="1"
      placeholder="Type a message... (Enter to send)"
    ></textarea>
    <button id="send-btn">Send</button>
  </div>

  <script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // Add a message bubble to the chat
    function addMessage(text, role) {
      const div = document.createElement('div');
      div.classList.add('message', role);
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight; // auto-scroll
      return div;
    }

    // Main send function
    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;

      // Show user message
      addMessage(message, 'user');
      userInput.value = '';
      sendBtn.disabled = true;

      // Create empty assistant bubble with blinking cursor
      const assistantDiv = addMessage('', 'assistant');
      assistantDiv.classList.add('streaming');

      try {
        // Call FastAPI streaming endpoint
        const response = await fetch('/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: message,
            system_prompt: 'You are a helpful AI assistant.',
            max_tokens: 1024
          })
        });

        // Read the stream token by token
        const reader = response.body.getReader();
        const decoder = new TextDecoder(); // converts bytes → string

        while (true) {
          const { done, value } = await reader.read();
          if (done) break; // stream finished

          const token = decoder.decode(value, { stream: true });
          assistantDiv.textContent += token; // append token to bubble
          chatBox.scrollTop = chatBox.scrollHeight; // keep scrolled down
        }

      } catch (err) {
        assistantDiv.textContent = '[Error]: ' + err.message;
      } finally {
        // Remove blinking cursor when done
        assistantDiv.classList.remove('streaming');
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    // Send on button click
    sendBtn.addEventListener('click', sendMessage);

    // Send on Enter (Shift+Enter for new line)
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>

</body>
</html>
